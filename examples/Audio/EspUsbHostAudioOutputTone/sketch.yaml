profiles:
  esp32s3:
    fqbn: esp32:esp32:esp32s3:USBMode=default
    platforms:
      - platform: esp32:esp32 (3.3.8)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - dir: ../../../

  esp32s3-v:
    fqbn: esp32:esp32:esp32s3:USBMode=default,DebugLevel=verbose
    platforms:
      - platform: esp32:esp32 (3.3.8)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - dir: ../../../

  esp32p4:
    fqbn: esp32:esp32:esp32p4
    platforms:
      - platform: esp32:esp32 (3.3.8)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - dir: ../../../

  esp32p4-v:
    fqbn: esp32:esp32:esp32p4:DebugLevel=verbose
    platforms:
      - platform: esp32:esp32 (3.3.8)
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - dir: ../../../

default_profile: esp32s3
